<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TadevaGAP">
  <link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>TadevaGAP 2026</title>
<style>
:root{
  --gold:#c8a84b;--gold2:#a8882b;--dark:#0f1117;--dark2:#161a24;--dark3:#1e2433;
  --card:#242938;--border:#2e3448;--text:#e8eaf2;--text2:#8b91a8;--text3:#4a5070;
  --green:#4caf7d;--red:#e05a5a;--blue:#5a9fe0;--orange:#e0955a;--purple:#9a5ae0;
  --s1:#4caf7d;--s2:#5a9fe0;--s3:#e0c45a;--s4:#e0955a;--s5:#9a5ae0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--dark);color:var(--text);font-size:14px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo img{width:30px;height:30px;border-radius:7px;object-fit:cover}
.topbar-logo span{font-weight:700;font-size:15px;letter-spacing:-.3px}
.topbar-logo small{color:var(--text3);font-size:11px;margin-left:2px}
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:280px;background:var(--dark2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
@media(max-width:700px){
  .sidebar{position:fixed;left:0;top:52px;bottom:0;width:85vw;max-width:300px;z-index:40;transform:translateX(-100%);transition:transform .25s ease}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.5);z-index:39}
  .sidebar-overlay.show{display:block}
  .main{width:100%!important}
}
.sidebar-search{padding:12px;border-bottom:1px solid var(--border)}
.search-input{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text3)}
.producer-list{flex:1;overflow-y:auto;padding:6px}
.producer-item{padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:3px;transition:background .15s}
.producer-item:hover{background:var(--dark3)}
.producer-item.active{background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.3)}
.pi-name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.pi-dots{display:flex;gap:3px}
.pi-dot{width:8px;height:8px;border-radius:2px;border:1px solid var(--border)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.stage-tabs{display:flex;background:var(--dark2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.stage-tabs::-webkit-scrollbar{height:0}
.stage-tab{flex:1;min-width:fit-content;padding:12px 14px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;text-align:center}
.stage-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.form-area{flex:1;overflow-y:auto;padding:16px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);text-align:center;padding:32px}
.empty-state svg{opacity:.3}
.empty-state h3{font-size:16px;color:var(--text2)}
.empty-state p{font-size:13px;line-height:1.5}

/* ── FORM ── */
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.s1-title{color:var(--s1)}.s2-title{color:var(--s2)}.s3-title{color:var(--s3)}.s4-title{color:var(--s4)}.s5-title{color:var(--s5)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.form-grid.three{grid-template-columns:1fr 1fr 1fr}
.form-grid.full{grid-template-columns:1fr}
@media(max-width:500px){.form-grid,.form-grid.three{grid-template-columns:1fr}}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.req{color:var(--red)}
.field-input,.field-select,.field-textarea{background:var(--dark3);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s;font-family:inherit}
.field-input:focus,.field-select:focus,.field-textarea:focus{border-color:var(--gold)}
.field-textarea{resize:vertical;min-height:70px}
.field-select option{background:var(--dark3)}

/* ── CHECKBOX ── */
.checkbox-group{display:flex;flex-wrap:wrap;gap:6px}
.cb-item{display:flex;align-items:center;gap:5px;background:var(--dark3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;cursor:pointer;font-size:12px;transition:all .15s;user-select:none}
.cb-item.checked{background:rgba(200,168,75,.15);border-color:var(--gold);color:var(--gold)}
.cb-item input{display:none}

/* ── GEO ── */
.geo-section{background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px}
.geo-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.geo-btn-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.geo-btn{flex:1;min-width:120px;background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;justify-content:center}
.geo-btn:hover{border-color:var(--gold);color:var(--gold)}
.finca-name-row{display:flex;gap:8px;margin-bottom:10px}
.finca-name-input{flex:1;background:var(--dark2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;outline:none}
.finca-name-input:focus{border-color:var(--gold)}
.coord-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.coord-item{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:11px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.coord-item-info{flex:1}
.coord-name{font-weight:600;color:var(--text);margin-bottom:2px}
.coord-vals{color:var(--text3);font-family:monospace}
.coord-del{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:13px}
.coord-del:hover{color:var(--red)}
.geo-map-preview{height:100px;border-radius:7px;background:var(--dark2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.map-placeholder{color:var(--text3);font-size:12px;text-align:center}

/* ── SAVE BAR ── */
.save-bar{display:flex;gap:10px;padding:14px 16px;background:var(--dark2);border-top:1px solid var(--border);flex-shrink:0}
.btn-save{flex:1;background:var(--gold);color:#000;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s}
.btn-save:hover{background:var(--gold2)}
.btn-clear{background:var(--dark3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:11px 16px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-clear:hover{border-color:var(--red);color:var(--red)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s ease;display:flex;align-items:center;gap:8px;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red)}

/* ── MOBILE TOGGLE ── */
.menu-btn{display:none;background:none;border:none;color:var(--text);padding:6px;cursor:pointer}
@media(max-width:700px){.menu-btn{display:flex;align-items:center;justify-content:center}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
</style>
</head>

<script>
// ============================================================
//  CONSTANTES
// ============================================================
const ALMACIGO_TIPOS = ['Bandeja flotante','Tierra','Otro'];
const SEMILLA_TIPOS  = ['Certificada','Propia','Comprada'];

const BACTERIOSIS= ['Erwinia','Pseudomonas','Otro'];
const PLAGAS     = ['Trips','Pulgones','Ácaros','Mosca blanca','Gusano','Otro'];
const COSECHA_STATUS = ['Sin iniciar','En proceso','Finalizada'];

// ============================================================
//  STORAGE — CLAVE ÚNICA: "gap_data_2026"
// ============================================================
const STORAGE_KEY = 'gap_data_2026';

function loadAllData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveAllData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    updateSaveStatus();
  } catch(e) { showToast('Error al guardar: almacenamiento lleno', true); }
}

function getData(cuit, stage) {
  if (!allData[cuit]) allData[cuit] = {};
  const stageKey = ['almacigo','plantacion','cultivo','cosecha','clasificado'][stage];
  if (!allData[cuit][stageKey]) allData[cuit][stageKey] = {};
  return allData[cuit][stageKey];
}

function updateSaveStatus() {
  const keys = Object.keys(allData);
  const filled = keys.filter(k => Object.keys(allData[k]).some(s => {
    const d = allData[k][s];
    return d && Object.values(d).some(v => v && String(v).trim() !== '');
  }));
  document.getElementById('saveStatus').textContent =
    filled.length ? `${filled.length} productores con datos` : '';
}

// Estado global
let allData = loadAllData();
let currentProducer = null;
let currentStage = 0;

// ============================================================

function renderSidebar(q='') {
  const list = document.getElementById('producerList');
  const filtered = PRODUCERS.filter(p =>
    p.productor.toLowerCase().includes(q.toLowerCase()) ||
    p.cuit.includes(q)
  );
  list.innerHTML = filtered.map(p => {
    const pData = allData[p.cuit] || {};
    const stages = ['almacigo','plantacion','cultivo','cosecha','clasificado'];
    const colors = ['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)'];
    const dots = stages.map((s,i) => {
      const d = pData[s];
      const filled = d && Object.values(d).some(v => v && String(v).trim() !== '');
      return `<div class="pi-dot" style="${filled ? 'background:'+colors[i]+';border-color:'+colors[i] : ''}"></div>`;
    }).join('');
    const isActive = currentProducer && currentProducer.cuit === p.cuit;
    return `<div class="producer-item${isActive?' active':''}" onclick="selectProducer('${p.cuit}')">
      <div class="pi-name">${p.productor}</div>
      <div class="pi-meta">
        <span>${p.origen}</span>
        <span>${p.sup} ha</span>
        <div class="pi-dots">${dots}</div>
      </div>
    </div>`;
  }).join('');
}

function selectProducer(cuit) {
  currentProducer = PRODUCERS.find(p => p.cuit === cuit);
  currentStage = 0;
  document.getElementById('stageTabs').style.display = 'flex';
  document.getElementById('saveBarEl').style.display = 'flex';

function updateStageTabs() {

function toggleSidebar() {

// ============================================================
//  GEO
// ============================================================
function geoHtml(stageIdx) {
  if (!currentProducer) return '';
  const stageKey = ['almacigo','plantacion','cultivo','cosecha','clasificado'][stageIdx];
  const d = getData(currentProducer.cuit, stageIdx);
  const fincas = d.fincas || [];
  const fincaItems = fincas.map((f,i) => `
    <div class="coord-item">
      <div class="coord-item-info">
        <div class="coord-name">${f.nombre}</div>
        <div class="coord-vals">${f.lat}, ${f.lng}${f.accuracy ? ' ±'+f.accuracy+'m' : ''}</div>
        <div class="coord-vals" style="color:var(--text3)">${f.timestamp||''}</div>
      </div>
      <button class="coord-del" onclick="removeFinca(${i},${stageIdx})">✕</button>
    </div>`).join('');
  const hasPins = fincas.length > 0;
  const mapPins = hasPins ? `<div style="color:var(--gold);font-size:12px;text-align:center">
    📍 ${fincas.length} finca${fincas.length>1?'s':''} registrada${fincas.length>1?'s':''}
    <br><span style="color:var(--text3);font-size:11px">${fincas.map(f=>f.nombre).join(', ')}</span>
  </div>` : '';
  return `<div class="geo-section">
    <div class="geo-header">📍 Georreferenciación</div>
    <div class="finca-name-row">
      <input class="finca-name-input" id="fincaNameInput" placeholder="Nombre de finca..." value="">
    </div>
    <div class="geo-btn-row">
      <button class="geo-btn" onclick="captureGeo(${stageIdx})">📡 GPS automático</button>
      <button class="geo-btn" onclick="manualGeo(${stageIdx})">✏️ Ingresar manual</button>
    </div>
    ${hasPins ? `<div class="coord-list">${fincaItems}</div>` : ''}
    <div class="geo-map-preview">
      ${hasPins ? mapPins : '<div class="map-placeholder"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:block;margin:0 auto 4px"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Sin coordenadas</div>'}
    </div>
  </div>`;
}

function captureGeo(stageIdx) {
  if (!navigator.geolocation) { showToast('GPS no disponible', true); return; }
  showToast('Obteniendo ubicación...');
  navigator.geolocation.getCurrentPosition(pos => {
    const nombre = document.getElementById('fincaNameInput')?.value || 'Finca';
    const d = getData(currentProducer.cuit, stageIdx);
    if (!d.fincas) d.fincas = [];
    d.fincas.push({ nombre, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), accuracy: pos.coords.accuracy.toFixed(0), timestamp: new Date().toLocaleString('es-AR') });
    saveAllData();
    renderStageForm();
    showToast('Ubicación capturada ✓');
  }, err => showToast('Error GPS: ' + err.message, true), { enableHighAccuracy:true, timeout:10000 });
}

function manualGeo(stageIdx) {
  const lat = prompt('LATITUD (ej: -23.456789):');
  if (!lat) return;
  const lng = prompt('LONGITUD (ej: -65.123456):');
  if (!lng) return;
  if (isNaN(parseFloat(lat)) || isNaN(parseFloat(lng))) { showToast('Coordenadas inválidas', true); return; }
  const nombre = document.getElementById('fincaNameInput')?.value || 'Finca';
  const d = getData(currentProducer.cuit, stageIdx);
  if (!d.fincas) d.fincas = [];
  d.fincas.push({ nombre, lat: parseFloat(lat).toFixed(6), lng: parseFloat(lng).toFixed(6), timestamp: new Date().toLocaleString('es-AR') });
  saveAllData();
  showToast('Coordenada guardada ✓');
  renderStageForm();
}

function removeFinca(idx, stageIdx) {
  const d = getData(currentProducer.cuit, stageIdx);
  d.fincas.splice(idx, 1);
  saveAllData();
  renderStageForm();
}

// ============================================================
//  CHECKBOX
// ============================================================
function toggleCheck(field, value, stageIdx) {
  const d = getData(currentProducer.cuit, stageIdx);
  if (!d[field]) d[field] = [];
  const idx = d[field].indexOf(value);
  if (idx >= 0) d[field].splice(idx, 1);
  else d[field].push(value);
  // Update visual
  event.currentTarget.classList.toggle('checked', d[field].includes(value));
}

function checkList(items, field, stageIdx) {
  const d = getData(currentProducer.cuit, stageIdx);
  const checked = d[field] || [];
  return items.map(v => `<label class="cb-item${checked.includes(v)?' checked':''}" onclick="toggleCheck('${field}','${v}',${stageIdx})">
    <input type="checkbox" ${checked.includes(v)?'checked':''}> ${v}
  </label>`).join('');
}

// ============================================================
//  FORMS
// ============================================================
function renderStageForm() {
  const form = document.getElementById('formArea');
  if (!currentProducer) return;
  const d = getData(currentProducer.cuit, currentStage);
  let html = '';
  if (currentStage === 0) html = almacijoForm(d);
  else if (currentStage === 1) html = plantacionForm(d);
  else if (currentStage === 2) html = cultivoForm(d);
  else if (currentStage === 3) html = cosechaForm(d);
  else if (currentStage === 4) html = clasificadoForm(d);
  form.innerHTML = html;
}

// ============================================================
//  GUARDAR — AHORA PERSISTE EN localStorage
// ============================================================
function collectFields() {
  if (!currentProducer) return;
  const d = getData(currentProducer.cuit, currentStage);
  document.querySelectorAll('[id^="f_"]').forEach(el => {
    if (el.id === 'fincaNameInput') return;
    const key = el.id.replace('f_','');
    if (el.type === 'checkbox') return;
    d[key] = el.value;
  });
}

function saveForm() {
  collectFields();
  saveAllData(); // ← PERSISTE EN localStorage
  renderSidebar(document.getElementById('searchInput').value);
  showToast('Datos guardados ✓');
}

function clearForm() {
  if (!confirm('¿Limpiar todos los datos de esta etapa?')) return;
  const stageKey = ['almacigo','plantacion','cultivo','cosecha','clasificado'][currentStage];
  const fincas = allData[currentProducer.cuit]?.[stageKey]?.fincas;
  allData[currentProducer.cuit][stageKey] = {};
  if (fincas) allData[currentProducer.cuit][stageKey].fincas = fincas;
  saveAllData();
  renderStageForm();
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ============================================================
//  INIT
// ============================================================
renderSidebar();
updateSaveStatus();
</script>
