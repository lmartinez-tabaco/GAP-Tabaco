<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2436;
    --border: #2a3050;
    --accent: #c8a84b;
    --accent2: #e8c96a;
    --green: #4caf7d;
    --red: #e05c5c;
    --blue: #5b8dee;
    --orange: #f0944a;
    --purple: #9b7ee8;
    --text: #e8eaf0;
    --text2: #8b92a8;
    --text3: #5a6178;
    --stage1: #4caf7d;
    --stage2: #5b8dee;
    --stage3: #f0944a;
    --stage4: #e05c5c;
    --stage5: #9b7ee8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 60px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
  }
  .header-logo svg { color: var(--accent); }
  .header-sub { color: var(--text2); font-size: 12px; font-weight: 400; }
  .header-badge {
    margin-left: auto;
    background: rgba(200,168,75,0.12);
    border: 1px solid rgba(200,168,75,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-search {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    position: relative;
  }
  .search-wrap { position: relative; }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .producer-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .producer-list::-webkit-scrollbar { width: 4px; }
  .producer-list::-webkit-scrollbar-track { background: transparent; }
  .producer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .producer-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }
  .producer-item:hover { background: rgba(255,255,255,0.03); }
  .producer-item.active {
    background: rgba(200,168,75,0.07);
    border-left-color: var(--accent);
  }
  .producer-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .producer-meta {
    font-size: 11px;
    color: var(--text2);
    font-family: 'Roboto Mono', monospace;
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .origin-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .origin-jujuy { background: rgba(91,141,238,0.15); color: #5b8dee; }
  .origin-salta { background: rgba(240,148,74,0.15); color: #f0944a; }
  .origin-organico { background: rgba(76,175,125,0.15); color: #4caf7d; }
  .progress-dots { display: flex; gap: 3px; margin-top: 5px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
  }
  .dot.filled { background: var(--accent); }
  .dot.filled.s1 { background: var(--stage1); }
  .dot.filled.s2 { background: var(--stage2); }
  .dot.filled.s3 { background: var(--stage3); }
  .dot.filled.s4 { background: var(--stage4); }
  .dot.filled.s5 { background: var(--stage5); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* PRODUCER HEADER */
  .producer-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .producer-header h2 { font-size: 20px; font-weight: 700; }
  .producer-header .cuit {
    font-family: 'Roboto Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }
  .producer-stats { display: flex; gap: 20px; }
  .stat-item { text-align: right; }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }

  /* STAGES TABS */
  .stages-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
  }
  .stage-tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    transition: all 0.2s;
    border: 1px solid transparent;
    letter-spacing: 0.3px;
  }
  .stage-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .stage-tab.active {
    color: #fff;
    border-color: currentColor;
  }
  .stage-tab.active.t1 { background: rgba(76,175,125,0.18); color: var(--stage1); border-color: rgba(76,175,125,0.3); }
  .stage-tab.active.t2 { background: rgba(91,141,238,0.18); color: var(--stage2); border-color: rgba(91,141,238,0.3); }
  .stage-tab.active.t3 { background: rgba(240,148,74,0.18); color: var(--stage3); border-color: rgba(240,148,74,0.3); }
  .stage-tab.active.t4 { background: rgba(224,92,92,0.18); color: var(--stage4); border-color: rgba(224,92,92,0.3); }
  .stage-tab.active.t5 { background: rgba(155,126,232,0.18); color: var(--stage5); border-color: rgba(155,126,232,0.3); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field-group {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
  }
  .field-group.span2 { grid-column: span 2; }
  .field-group.span3 { grid-column: span 3; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .field-label .req { color: var(--accent); }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-textarea { resize: vertical; min-height: 80px; }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--accent);
  }
  .field-select option { background: var(--surface2); }
  .checkbox-group { display: flex; flex-direction: column; gap: 6px; }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: 6px;
    transition: background 0.1s;
  }
  .checkbox-item:hover { background: rgba(255,255,255,0.04); }
  .checkbox-item input[type="checkbox"] {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .checkbox-item label { font-size: 12px; cursor: pointer; color: var(--text2); }
  .checkbox-item input:checked + label { color: var(--text); }

  /* GEO section */
  .geo-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .geo-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    color: var(--accent);
  }
  .geo-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
  .btn-geo {
    background: rgba(200,168,75,0.15);
    border: 1px solid rgba(200,168,75,0.3);
    color: var(--accent);
    padding: 9px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-geo:hover { background: rgba(200,168,75,0.25); }
  .geo-status {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    font-family: 'Roboto Mono', monospace;
  }
  .geo-status.ok { color: var(--green); }
  .geo-map-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    height: 160px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .map-placeholder {
    text-align: center;
    color: var(--text3);
    font-size: 12px;
  }
  .map-pin {
    position: absolute;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 3px rgba(200,168,75,0.3);
    transform: translate(-50%, -50%);
    transition: all 0.3s;
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 12px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title:before {
    content: '';
    display: block;
    width: 20px;
    height: 2px;
    border-radius: 2px;
  }
  .s1-title:before { background: var(--stage1); }
  .s2-title:before { background: var(--stage2); }
  .s3-title:before { background: var(--stage3); }
  .s4-title:before { background: var(--stage4); }
  .s5-title:before { background: var(--stage5); }

  /* SAVE BTN */
  .save-bar {
    margin-top: 24px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-save:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-clear {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-clear:hover { border-color: var(--text2); color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 12px;
    color: var(--text3);
  }
  .empty-state svg { opacity: 0.4; }
  .empty-state h3 { font-size: 16px; font-weight: 600; }
  .empty-state p { font-size: 13px; }

  /* SAVED INDICATOR */
  .saved-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(76,175,125,0.15);
    border: 1px solid rgba(76,175,125,0.3);
    color: var(--green);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* FINCA COORD LIST */
  .coord-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .coord-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-family: 'Roboto Mono', monospace;
  }
  .coord-item .coord-name { color: var(--text); font-weight: 500; font-family: 'Space Grotesk', sans-serif; }
  .coord-item .coord-val { color: var(--text2); }
  .coord-del {
    background: none; border: none; cursor: pointer;
    color: var(--text3); padding: 2px 6px; border-radius: 4px;
    font-size: 14px; transition: color 0.15s;
  }
  .coord-del:hover { color: var(--red); }

  /* Multi-finca */
  .finca-add-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .finca-name-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .finca-name-input:focus { border-color: var(--accent); }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  /* Responsive mobile */
  @media (max-width: 768px) {
    .sidebar { width: 240px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid.three { grid-template-columns: 1fr; }
    .field-group.span2, .field-group.span3 { grid-column: span 1; }
    .producer-stats { display: none; }
    .geo-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Install Banner */
  #installBanner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    align-items: center;
    gap: 12px;
    z-index: 200;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
  }
  #installBanner .ib-text { flex: 1; font-size: 13px; }
  #installBanner .ib-text strong { display: block; font-size: 14px; }
  #installBanner .ib-text span { color: var(--text2); font-size: 12px; }
  .btn-install {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 9px 18px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-install-close {
    background: none; border: none; color: var(--text3);
    font-size: 20px; cursor: pointer; padding: 4px 8px;
  }
</style>
</head>
<body>

// ============================================================
//  STATE
// ============================================================
let currentProducer = null;
let currentStage = 0;
let formData = {}; // { cuit: { stage: { fields } } }

function getData(cuit, stage) {
  if (!formData[cuit]) formData[cuit] = {};
  if (!formData[cuit][stage]) formData[cuit][stage] = {};
  return formData[cuit][stage];
}

// ============================================================
//  RENDER SIDEBAR
// ============================================================
function renderSidebar(filter = '') {
  const list = document.getElementById('producerList');
  const lf = filter.toLowerCase();
  const filtered = PRODUCERS.filter(p =>
    p.productor.toLowerCase().includes(lf) ||
    p.cuit.includes(lf) ||
    p.origen.toLowerCase().includes(lf)
  );
  list.innerHTML = filtered.map(p => {
    const isActive = currentProducer && currentProducer.cuit === p.cuit;
    const stagesCompleted = formData[p.cuit] ? Object.keys(formData[p.cuit]).length : 0;
    const dots = STAGE_COLORS.map((c,i) =>
      `<div class="dot ${stagesCompleted > i ? 'filled '+c : ''}"></div>`
    ).join('');
    const oc = p.origen === 'Salta' ? 'origin-salta' : p.origen === 'Organico' ? 'origin-organico' : 'origin-jujuy';
    return `<div class="producer-item ${isActive ? 'active' : ''}" onclick="selectProducer('${p.cuit}')">
      <div class="producer-name">${p.productor}</div>
      <div class="producer-meta">
        <span class="origin-badge ${oc}">${p.origen}</span>
        ${p.sup ? p.sup+' ha' : ''}
      </div>
      <div class="progress-dots">${dots}</div>
    </div>`;
  }).join('');
}

function selectProducer(cuit) {
  currentProducer = PRODUCERS.find(p => p.cuit === cuit);
  renderSidebar(document.getElementById('searchInput').value);
  renderMain();
}

document.getElementById('searchInput').addEventListener('input', e => {
  renderSidebar(e.target.value);
});

// ============================================================
//  RENDER MAIN
// ============================================================
function renderMain() {
  if (!currentProducer) return;
  const d = currentProducer;
  const main = document.getElementById('mainContent');

  const oc = d.origen === 'Salta' ? 'origin-salta' : d.origen === 'Organico' ? 'origin-organico' : 'origin-jujuy';

  main.innerHTML = `
    <div class="producer-header">
      <div>
        <h2>${d.productor}</h2>
        <div class="cuit">CUIT: ${d.cuit} &nbsp;·&nbsp; <span class="origin-badge ${oc}" style="font-size:11px">${d.origen}</span></div>
      </div>
      <div class="producer-stats">
        ${d.sup ? `<div class="stat-item"><div class="stat-value">${parseFloat(d.sup).toFixed(1)}</div><div class="stat-label">Sup. 2025-26 (ha)</div></div>` : ''}
        ${d.cupo ? `<div class="stat-item"><div class="stat-value">${parseInt(d.cupo).toLocaleString()}</div><div class="stat-label">Cupo 26-27 (kg)</div></div>` : ''}
      </div>
    </div>

    <div class="stages-nav" id="stagesNav">
      ${STAGE_NAMES.map((s,i) => `
        <div class="stage-tab ${currentStage===i?'active t'+(i+1):''}" onclick="setStage(${i})">
          <div>${s}</div>
        </div>
      `).join('')}
    </div>

    <div id="stageForm"></div>
  `;

  renderStageForm();
}

function setStage(idx) {
  currentStage = idx;
  renderMain();
}

function geoHtml(stageKey) {
  const d = getData(currentProducer.cuit, stageKey);
  const fincas = d.fincas || [];
  const fincaItems = fincas.map((f,i) => `
    <div class="coord-item">
      <span class="coord-name">${f.nombre || 'Finca '+(i+1)}</span>
      <span class="coord-val">${f.lat}, ${f.lng}</span>
      <button class="coord-del" onclick="removeFinca(${i},'${stageKey}')">×</button>
    </div>
  `).join('');

  const hasPins = fincas.length > 0;
  const mapPins = fincas.slice(0,5).map((f,i) => {
    // Normalize to map preview (rough)
    const px = 50 + (parseFloat(f.lng) % 1) * 400;
    const py = 80 + (parseFloat(f.lat) % 1) * 200;
    return `<div class="map-pin" style="left:${(i*18+30)%80}%;top:${(i*22+25)%60}%"></div>`;
  }).join('');

  return `

}

function captureGeo(stageKey) {
  if (!navigator.geolocation) {
    showToast('Geolocalización no disponible en este dispositivo', true);
    return;
  }
  showToast('Obteniendo ubicación GPS...');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const nombre = document.getElementById('fincaNameInput')?.value || 'Finca';
      const d = getData(currentProducer.cuit, stageKey);
      if (!d.fincas) d.fincas = [];
      d.fincas.push({
        nombre,
        lat: pos.coords.latitude.toFixed(6),
        lng: pos.coords.longitude.toFixed(6),
        accuracy: pos.coords.accuracy.toFixed(0),
        timestamp: new Date().toLocaleString('es-AR')
      });
      showToast(`📍 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)} — Precisión: ${pos.coords.accuracy.toFixed(0)}m`);
      renderStageForm();
    },
    err => showToast('Error GPS: ' + err.message, true),
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function manualGeo(stageKey) {
  const lat = prompt('Ingresá la LATITUD (ej: -23.456789):');
  if (!lat) return;
  const lng = prompt('Ingresá la LONGITUD (ej: -65.123456):');
  if (!lng) return;
  const nombre = document.getElementById('fincaNameInput')?.value || 'Finca';
  if (isNaN(parseFloat(lat)) || isNaN(parseFloat(lng))) {
    showToast('Coordenadas inválidas', true);
    return;
  }
  const d = getData(currentProducer.cuit, stageKey);
  if (!d.fincas) d.fincas = [];
  d.fincas.push({ nombre, lat: parseFloat(lat).toFixed(6), lng: parseFloat(lng).toFixed(6), timestamp: new Date().toLocaleString('es-AR') });
  showToast('Coordenada guardada ✓');
  renderStageForm();
}

function removeFinca(idx, stageKey) {
  const d = getData(currentProducer.cuit, stageKey);
  d.fincas.splice(idx, 1);
  renderStageForm();
}

function renderStageForm() {
  const form = document.getElementById('stageForm');
  if (!form) return;
  const stage = currentStage;
  const cuit = currentProducer.cuit;
  const d = getData(cuit, stage);

  let html = '';

  if (stage === 0) html = almacijoForm(d);
  else if (stage === 1) html = plantacionForm(d);
  else if (stage === 2) html = cultivoForm(d);
  else if (stage === 3) html = cosechaForm(d);
  else if (stage === 4) html = clasificadoForm(d);

  form.innerHTML = html + `
    <div class="save-bar">
      <button class="btn-clear" onclick="clearForm()">Limpiar</button>
      <button class="btn-save" onclick="saveForm()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        Guardar
      </button>
    </div>
  `;
}

// ============================================================
//  CHECKBOX TOGGLE
// ============================================================
function toggleCheck(field, value) {
  const d = getData(currentProducer.cuit, currentStage);
  if (!d[field]) d[field] = [];
  const idx = d[field].indexOf(value);
  if (idx >= 0) d[field].splice(idx, 1);
  else d[field].push(value);
}

// ============================================================
//  SAVE / CLEAR
// ============================================================
function collectFields() {
  const d = getData(currentProducer.cuit, currentStage);
  document.querySelectorAll('[id^="f_"]').forEach(el => {
    const key = el.id.replace('f_','');
    if (el.type === 'checkbox') return; // handled separately
    d[key] = el.value;
  });
}

function saveForm() {
  collectFields();
  renderSidebar(document.getElementById('searchInput').value);
  showToast('Datos guardados correctamente ✓');
}

function clearForm() {
  if (!confirm('¿Limpiar todos los datos de esta etapa?')) return;
  const d = getData(currentProducer.cuit, currentStage);
  const fincas = d.fincas; // preserve geo
  Object.keys(d).forEach(k => delete d[k]);
  if (fincas) d.fincas = fincas;
  renderStageForm();
}

// ============================================================
//  TOAST
// ============================================================
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  const m = document.getElementById('toastMsg');
  m.textContent = msg;
  t.style.background = isError ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}
