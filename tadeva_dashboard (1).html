<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TadevaGAP — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f0a;
    --bg2: #111710;
    --bg3: #161d14;
    --card: #1a2118;
    --border: #2a3828;
    --green: #5ddb6f;
    --green2: #3ab84a;
    --green-dim: rgba(93,219,111,0.12);
    --yellow: #f5c842;
    --red: #f05a5a;
    --blue: #5ab4f5;
    --text: #e8f0e6;
    --text2: #8fa88a;
    --text3: #5a7055;
    --stage1: #5ddb6f;
    --stage2: #5ab4f5;
    --stage3: #f5c842;
    --stage4: #f07a5a;
    --stage5: #c45af5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .logo span { color: var(--text2); font-weight: 400; font-size: 14px; margin-left: 4px; }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-update { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }
  .refresh-btn {
    background: var(--green-dim);
    border: 1px solid var(--green2);
    color: var(--green);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(93,219,111,0.2); }

  /* ── MAIN ── */
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi.green::before { background: var(--green); }
  .kpi.blue::before  { background: var(--blue); }
  .kpi.yellow::before { background: var(--yellow); }
  .kpi.red::before   { background: var(--red); }
  .kpi.purple::before { background: var(--stage5); }
  .kpi.overall::before { background: linear-gradient(90deg, var(--stage1), var(--stage2), var(--stage3), var(--stage4), var(--stage5)); }

  .kpi-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .kpi-value { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .kpi.green .kpi-value { color: var(--green); }
  .kpi.blue .kpi-value  { color: var(--blue); }
  .kpi.yellow .kpi-value { color: var(--yellow); }
  .kpi.red .kpi-value   { color: var(--red); }
  .kpi.purple .kpi-value { color: var(--stage5); }
  .kpi.overall .kpi-value { color: var(--text); }
  .kpi-sub { font-size: 12px; color: var(--text2); }

  /* ── GRID 2 COL ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width: 900px){ .grid2 { grid-template-columns: 1fr; } }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── STAGE PROGRESS BARS ── */
  .stage-row { margin-bottom: 14px; }
  .stage-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .stage-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .stage-badge { width: 8px; height: 8px; border-radius: 50%; }
  .stage-pct { font-family: 'DM Mono', monospace; font-size: 13px; }
  .progress-track { height: 6px; background: var(--bg); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* ── PIE / DONUT SVG ── */
  .donut-wrap { display: flex; align-items: center; gap: 20px; }
  .donut-legend { flex: 1; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 13px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-label { flex: 1; color: var(--text2); }
  .legend-val { font-family: 'DM Mono', monospace; font-weight: 500; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    padding: 8px 10px;
    color: var(--text3);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 9px 10px;
    border-bottom: 1px solid rgba(42,56,40,0.5);
    vertical-align: middle;
  }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .producer-name { font-weight: 600; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .origin-badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .origin-jujuy { background: rgba(90,180,245,0.15); color: var(--blue); }
  .origin-salta { background: rgba(245,200,66,0.15); color: var(--yellow); }
  .origin-org   { background: rgba(93,219,111,0.15); color: var(--green); }

  /* Stage dots in table */
  .dots { display: flex; gap: 4px; }
  .dot {
    width: 14px; height: 14px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
  }
  .dot-done  { background: var(--green-dim); border: 1px solid var(--green2); }
  .dot-empty { background: var(--bg); border: 1px solid var(--border); }

  .pct-bar-mini { display: flex; align-items: center; gap: 8px; }
  .bar-mini { flex: 1; height: 4px; background: var(--bg); border-radius: 99px; overflow: hidden; min-width: 40px; }
  .bar-mini-fill { height: 100%; border-radius: 99px; background: var(--green); }
  .pct-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); min-width: 30px; text-align: right; }

  /* ── SEARCH ── */
  .table-controls { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--green2); }
  .search-box::placeholder { color: var(--text3); }

  .filter-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  /* ── NO DATA ── */
  .no-data {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .no-data h3 { font-size: 18px; margin-bottom: 8px; color: var(--text2); }
  .no-data p { font-size: 14px; line-height: 1.6; }
  .no-data code {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--green);
    margin-top: 8px;
  }

  /* ── SECTION FULL WIDTH ── */
  .section-full { margin-bottom: 16px; }

  /* ── ACTIVITY LOG ── */
  .activity-list { max-height: 300px; overflow-y: auto; }
  .activity-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(42,56,40,0.4);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 1px; }
  .activity-content { flex: 1; }
  .activity-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .activity-meta { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────
const STAGES = [
  { key: 'almacigo',   label: 'Almácigo',   emoji: '🌱', color: '#5ddb6f' },
  { key: 'plantacion', label: 'Plantación', emoji: '🌿', color: '#5ab4f5' },
  { key: 'cultivo',    label: 'Cultivo',    emoji: '🍃', color: '#f5c842' },
  { key: 'cosecha',    label: 'Cosecha',    emoji: '🚜', color: '#f07a5a' },
  { key: 'clasificado',label: 'Clasificado',emoji: '📦', color: '#c45af5' },
];

// Fields that confirm a stage was actually filled
const STAGE_KEY_FIELDS = {
  almacigo:   ['fecha_visita'],
  plantacion: ['fecha_visita'],
  cultivo:    ['fecha_visita'],
  cosecha:    ['fecha_visita'],
  clasificado:['fecha_visita','clasificacion_tipo'],
};

// ─── LOAD DATA ────────────────────────────────────────────────
function loadData() {
  // Try to read from the TadevaGAP app's storage key
  let rawData = null;
  // Clave exacta usada por la app TadevaGAP
  const POSSIBLE_KEYS = ['gap_data_2026', 'gap_data', 'tadeva_gap_data', 'gap_tabaco_data', 'gapData'];
  for (const k of POSSIBLE_KEYS) {
    const v = localStorage.getItem(k);
    if (v) { try { rawData = JSON.parse(v); break; } catch(e){} }
  }

  // Fallback: scan all localStorage keys
  if (!rawData || Object.keys(rawData).length === 0) {
    rawData = {};
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key) continue;
      const parts = key.split(':');
      if (parts.length === 2 && /^\d{11}$/.test(parts[0]) && STAGES.find(s => s.key === parts[1])) {
        try {
          if (!rawData[parts[0]]) rawData[parts[0]] = {};
          rawData[parts[0]][parts[1]] = JSON.parse(localStorage.getItem(key));
        } catch(e){}
      }
    }
  }

  // ── Try to get producer list from app ──
  let producers = [];
  const PROD_KEYS = ['gap_producers', 'producers', 'producerList'];
  for (const k of PROD_KEYS) {
    const v = localStorage.getItem(k);
    if (v) { try { producers = JSON.parse(v); break; } catch(e){} }
  }

  // Infer producer list from data keys if not found
  const dataCuits = Object.keys(rawData || {});
  
  document.getElementById('lastUpdate').textContent =
    'Actualizado: ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});

  if (dataCuits.length === 0) {
    document.getElementById('noDataMsg').style.display = '';
    document.getElementById('dashContent').style.display = 'none';
    renderDemo();
    return;
  }

  document.getElementById('noDataMsg').style.display = 'none';
  document.getElementById('dashContent').style.display = '';
  renderDashboard(rawData, producers);
}

// ─── CHECK IF STAGE IS FILLED ─────────────────────────────────
function stageComplete(stageData, stageKey) {
  if (!stageData) return false;
  const required = STAGE_KEY_FIELDS[stageKey] || ['fecha_visita'];
  return required.some(f => stageData[f] && stageData[f].trim() !== '');
}

// Count filled fields in a stage object (rough "completeness" score)
function stageFillScore(stageData, stageKey) {
  if (!stageData) return 0;
  const vals = Object.values(stageData).filter(v =>
    v !== null && v !== undefined && String(v).trim() !== '' && !Array.isArray(v)
  );
  return vals.length;
}

// ─── RENDER DASHBOARD ─────────────────────────────────────────
function renderDashboard(data, producers) {
  const cuits = Object.keys(data);
  const total = cuits.length;

  // Compute per-producer stats
  const stats = cuits.map(cuit => {
    const pData = data[cuit];
    const stagesDone = STAGES.filter(s => stageComplete(pData[s.key], s.key));
    const producer = producers.find(p => p.cuit === cuit) || { cuit, productor: cuit, origen: '', sup: '' };
    return { cuit, producer, pData, stagesDone, pct: Math.round(stagesDone.length / STAGES.length * 100) };
  });

  // KPIs
  const fully = stats.filter(s => s.stagesDone.length === STAGES.length).length;
  const partial = stats.filter(s => s.stagesDone.length > 0 && s.stagesDone.length < STAGES.length).length;
  const empty = stats.filter(s => s.stagesDone.length === 0).length;
  const avgPct = total ? Math.round(stats.reduce((a,s) => a + s.pct, 0) / total) : 0;

  const stageCounts = STAGES.map(st => ({
    ...st,
    count: stats.filter(s => stageComplete(s.pData[st.key], st.key)).length,
    pct: total ? Math.round(stats.filter(s => stageComplete(s.pData[st.key], st.key)).length / total * 100) : 0
  }));

  // Origin breakdown
  const origins = {};
  stats.forEach(s => {
    const o = s.producer.origen || 'Sin dato';
    if (!origins[o]) origins[o] = { total: 0, done: 0 };
    origins[o].total++;
    origins[o].done += s.stagesDone.length;
  });

  // Recent activity (producers with most recently updated data)
  // We can't know timestamps unless stored, so show most complete ones
  const recent = [...stats].sort((a,b) => b.stagesDone.length - a.stagesDone.length).slice(0,8);

  const html = `
    <!-- KPI STRIP -->
    <div class="kpi-strip">
      <div class="kpi overall">
        <div class="kpi-label">Avance general</div>
        <div class="kpi-value">${avgPct}%</div>
        <div class="kpi-sub">${total} productores</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Completos</div>
        <div class="kpi-value">${fully}</div>
        <div class="kpi-sub">5/5 etapas</div>
      </div>
      <div class="kpi blue">
        <div class="kpi-label">En progreso</div>
        <div class="kpi-value">${partial}</div>
        <div class="kpi-sub">1–4 etapas</div>
      </div>
      <div class="kpi yellow">
        <div class="kpi-label">Sin inicio</div>
        <div class="kpi-value">${empty}</div>
        <div class="kpi-sub">0 etapas cargadas</div>
      </div>
      ${Object.entries(origins).map(([o,v]) => `
        <div class="kpi ${o.toLowerCase().includes('jujuy')?'blue':o.toLowerCase().includes('salta')?'yellow':'green'}">
          <div class="kpi-label">${o}</div>
          <div class="kpi-value">${v.total}</div>
          <div class="kpi-sub">${Math.round(v.done / STAGES.length / v.total * 100)}% etapas</div>
        </div>
      `).join('')}
    </div>

    <!-- MIDDLE GRID -->
    <div class="grid2">
      <!-- Avance por etapa -->
      <div class="card">
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--green)"></div>
          Avance por etapa
        </div>
        ${stageCounts.map(st => `
          <div class="stage-row">
            <div class="stage-header">
              <div class="stage-name">
                <div class="stage-badge" style="background:${st.color}"></div>
                ${st.emoji} ${st.label}
              </div>
              <div class="stage-pct" style="color:${st.color}">${st.count}/${total} (${st.pct}%)</div>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${st.pct}%; background:${st.color}"></div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Distribución por origen -->
      <div class="card">
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--blue)"></div>
          Distribución por origen
        </div>
        ${renderDonut(origins, total)}
      </div>
    </div>

    <!-- TABLA COMPLETA -->
    <div class="section-full">
      <div class="card">
        <div class="card-title">
          <div class="card-title-dot" style="background:var(--yellow)"></div>
          Seguimiento individual
          <span style="margin-left:auto;font-size:11px;color:var(--text3);text-transform:none;letter-spacing:0">
            ${total} registros
          </span>
        </div>
        <div class="table-controls">
          <input class="search-box" type="text" placeholder="Buscar productor / CUIT..." id="tableSearch" oninput="filterTable()">
          <select class="filter-select" id="filterOrigin" onchange="filterTable()">
            <option value="">Todos los orígenes</option>
            ${[...new Set(stats.map(s => s.producer.origen).filter(Boolean))].map(o =>
              `<option value="${o}">${o}</option>`
            ).join('')}
          </select>
          <select class="filter-select" id="filterStage" onchange="filterTable()">
            <option value="">Todos los estados</option>
            <option value="complete">Completos (5/5)</option>
            <option value="partial">En progreso</option>
            <option value="empty">Sin iniciar</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Productor</th>
                <th>Origen</th>
                <th>Sup. (ha)</th>
                ${STAGES.map(s => `<th style="color:${s.color}">${s.emoji}</th>`).join('')}
                <th>Avance</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              ${renderRows(stats)}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  document.getElementById('dashContent').innerHTML = html;
  window._stats = stats; // for filtering
}

function renderRows(stats) {
  return stats.map((s, i) => {
    const originClass = s.producer.origen?.toLowerCase().includes('jujuy') ? 'origin-jujuy'
      : s.producer.origen?.toLowerCase().includes('salta') ? 'origin-salta' : 'origin-org';

    const dots = STAGES.map(st => {
      const done = stageComplete(s.pData[st.key], st.key);
      return `<div class="dot ${done?'dot-done':'dot-empty'}" title="${st.label}"
                style="${done?'border-color:'+st.color+';color:'+st.color:''}">
                ${done?'✓':''}
              </div>`;
    }).join('');

    return `<tr data-name="${s.producer.productor?.toLowerCase()}" 
                data-cuit="${s.cuit}"
                data-origin="${s.producer.origen?.toLowerCase()||''}"
                data-stages="${s.stagesDone.length}">
      <td style="color:var(--text3);font-family:'DM Mono',monospace;font-size:11px">${i+1}</td>
      <td>
        <div class="producer-name" title="${s.producer.productor}">${s.producer.productor || s.cuit}</div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">${s.cuit}</div>
      </td>
      <td><span class="origin-badge ${originClass}">${s.producer.origen||'—'}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${s.producer.sup||'—'}</td>
      ${STAGES.map(st => {
        const done = stageComplete(s.pData[st.key], st.key);
        return `<td><div class="dot ${done?'dot-done':'dot-empty'}" style="${done?'border-color:'+st.color+';color:'+st.color:''}">${done?'✓':''}</div></td>`;
      }).join('')}
      <td>
        <div class="pct-bar-mini">
          <div class="bar-mini"><div class="bar-mini-fill" style="width:${s.pct}%;background:${s.pct===100?'var(--green)':s.pct>50?'var(--yellow)':'var(--blue)'}"></div></div>
          <span class="pct-text">${s.pct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterTable() {
  const q = document.getElementById('tableSearch').value.toLowerCase();
  const origin = document.getElementById('filterOrigin').value.toLowerCase();
  const stage = document.getElementById('filterStage').value;
  const rows = document.querySelectorAll('#tableBody tr');
  rows.forEach(row => {
    const name = row.dataset.name || '';
    const cuit = row.dataset.cuit || '';
    const rowOrigin = row.dataset.origin || '';
    const stages = parseInt(row.dataset.stages) || 0;
    const matchQ = !q || name.includes(q) || cuit.includes(q);
    const matchO = !origin || rowOrigin.includes(origin);
    const matchS = !stage
      || (stage === 'complete' && stages === 5)
      || (stage === 'partial' && stages > 0 && stages < 5)
      || (stage === 'empty' && stages === 0);
    row.style.display = (matchQ && matchO && matchS) ? '' : 'none';
  });
}

function renderDonut(origins, total) {
  const colors = ['#5ab4f5','#f5c842','#5ddb6f','#f07a5a','#c45af5'];
  const entries = Object.entries(origins);
  let cumulativePct = 0;
  const radius = 60, cx = 70, cy = 70, strokeW = 18;
  const circum = 2 * Math.PI * radius;

  const segments = entries.map(([o, v], i) => {
    const pct = v.total / total;
    const dash = pct * circum;
    const gap = circum - dash;
    const offset = cumulativePct * circum;
    cumulativePct += pct;
    return { o, v, color: colors[i % colors.length], dash, gap, offset };
  });

  return `
    <div class="donut-wrap">
      <svg width="140" height="140" viewBox="0 0 140 140" style="flex-shrink:0">
        <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none" stroke="var(--bg)" stroke-width="${strokeW}"/>
        ${segments.map(s => `
          <circle cx="${cx}" cy="${cy}" r="${radius}" fill="none"
            stroke="${s.color}" stroke-width="${strokeW}"
            stroke-dasharray="${s.dash} ${s.gap}"
            stroke-dashoffset="${-(s.offset)}"
            transform="rotate(-90 ${cx} ${cy})"
            stroke-linecap="round"
          />
        `).join('')}
        <text x="${cx}" y="${cy - 6}" text-anchor="middle" fill="var(--text)" font-family="Syne" font-weight="800" font-size="22">${total}</text>
        <text x="${cx}" y="${cy + 14}" text-anchor="middle" fill="var(--text3)" font-family="Syne" font-size="11">total</text>
      </svg>
      <div class="donut-legend">
        ${segments.map(s => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${s.color}"></div>
            <div class="legend-label">${s.o}</div>
            <div class="legend-val" style="color:${s.color}">${s.v.total}</div>
          </div>
          <div style="font-size:11px;color:var(--text3);margin:-6px 0 8px 18px;font-family:'DM Mono',monospace">
            ${Math.round(s.v.done / STAGES.length / s.v.total * 100)}% etapas completadas
          </div>
        `).join('')}
      </div>
    </div>
  `;
}
